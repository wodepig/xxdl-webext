name: зЁӢеәҸйғЁзҪІ

on:
  push:
    branches:
      - main

jobs:
  build-push:
    if: contains(github.event.head_commit.message, 'йғЁзҪІ') || contains(github.event.head_commit.message, 'иҮӘеҠЁжӣҙж–°')
    runs-on: ubuntu-latest
    outputs:
      start_time: ${{ steps.start_time.outputs.time }}
    env:
      SCT_AK: ${{ vars.SCT_AK }}
    steps:
      - name: Record start time
        id: start_time
        run: echo "time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Start Notify
        run: curl "https://sctapi.ftqq.com/${{ vars.SCT_AK }}.send?title=рҹҹЎ${{ github.event.repository.name }}&desp=е·ІејҖе§ӢйғЁзҪІ"
      # еӨ„зҗҶ commit messageпјҲWindows PowerShell зүҲжң¬пјү
      - name: Get commit message and clean it
        id: get_commit_message
        shell: pwsh
        run: |
          # иҺ·еҸ– commit messageпјҲWindows з”Ё Git зҡ„ж–№ејҸпјү
          $msg = git log -1 --pretty=%B

          # еҺ»йҷӨжҚўиЎҢе’Ң "иҮӘеҠЁжӣҙж–°"
          $cleaned = ($msg -replace "`r`n", "" -replace "`n", "") -replace "иҮӘеҠЁжӣҙж–°",""

          # еҶҷе…ҘзҺҜеўғеҸҳйҮҸ
          echo "cleaned_message=$cleaned" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies (with fixes)
        run: pnpm install

      - name: fix jiti module
        run: pnpm fix_jiti

      - name: Build project
        run: pnpm build

      - name: package project
        run: pnpm package
      - name: Push To UpgradeLink
        id: push-upgradelink
        uses: wodepig/upgradelink-upload-xxdl@latest
        with:
          upgradelink_username: ${{ vars.UPGRADELINK_USERNAME }}
          upgradelink_pwd: ${{ secrets.UPGRADELINK_PWD }}
          upgradelink_type: ${{ vars.UPGRADELINK_TYPE }}
          upgradelink_key: ${{ secrets.UPGRADELINK_KEY }}
          prompt_upgrade_content: ${{ env.cleaned_message }}
          dist_url: build
          yunma_token: ${{ vars.YUNMA_TOKEN }}
          auto_push: true
  send-notification:
    if: always() && (contains(github.event.head_commit.message, 'йғЁзҪІ') || contains(github.event.head_commit.message, 'иҮӘеҠЁжӣҙж–°'))
    needs: [build-push, remote-deploy]
    env:
      SCT_AK: ${{ vars.SCT_AK }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code for commit info
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Calculate deployment time
        id: time_calc
        run: |
          start_time=${{ needs.build-push.outputs.start_time }}
          end_time=$(date +%s)
          duration=$((end_time - start_time))
          mins=$((duration / 60))
          secs=$((duration % 60))
          echo "duration=${mins}еҲҶ${secs}з§’" >> $GITHUB_OUTPUT
          echo "current_time=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

      - name: Determine status
        id: status_check
        run: |
          if [ "${{ needs.build-push.result }}" == "success" ] && [ "${{ needs.remote-deploy.result }}" == "success" ]; then
            echo "status=жҲҗеҠҹ" >> $GITHUB_OUTPUT
            echo "status_emoji=рҹҹў" >> $GITHUB_OUTPUT
          else
            echo "status=еӨұиҙҘ" >> $GITHUB_OUTPUT
            echo "status_emoji=рҹ”ҙ" >> $GITHUB_OUTPUT
          fi

      - name: Get commit info
        id: commit_info
        run: |
          commit_msg=$(git log -1 --pretty=format:"%s")
          commit_hash=$(git rev-parse --short HEAD)
          echo "commit_msg=${commit_msg}" >> $GITHUB_OUTPUT
          echo "commit_hash=${commit_hash}" >> $GITHUB_OUTPUT

      - name: Send notification
        run: |
          title="${{ steps.status_check.outputs.status_emoji }}${{ github.event.repository.name }}йғЁзҪІ${{ steps.status_check.outputs.status }}"
          desp="йғЁзҪІзҠ¶жҖҒпјҡ${{ steps.status_check.outputs.status }}
          йғЁзҪІиҖ—ж—¶пјҡ${{ steps.time_calc.outputs.duration }}
          жҸҗдәӨдҝЎжҒҜпјҡ${{ steps.commit_info.outputs.commit_msg }}
          жҸҗдәӨе“ҲеёҢпјҡ${{ steps.commit_info.outputs.commit_hash }}
          е®ҢжҲҗж—¶й—ҙпјҡ${{ steps.time_calc.outputs.current_time }}"
          
          curl -s "https://sctapi.ftqq.com/${{ vars.SCT_AK }}.send" \
            -d "title=${title}" \
            -d "desp=${desp}"
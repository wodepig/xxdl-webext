<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <style>
      body {
        width: 470px;
        min-height: 400px;
      }
      /* tabs 样式优化 - 与卡片风格统一 */
      .tabs-custom {
        display: flex;
        gap: 8px;
        padding-bottom: 12px;
        border-bottom: 1px solid hsl(var(--b3));
      }
      .tabs-custom .tab {
        font-weight: 500;
        color: hsl(var(--bc) / 0.6);
        padding: 8px 16px;
        border-radius: 8px;
        transition: all 0.2s;
        cursor: pointer;
      }
      .tabs-custom .tab:hover {
        color: hsl(var(--bc));
        background-color: hsl(var(--b2));
      }
      .tabs-custom .tab:checked {
        color: hsl(var(--p));
        background-color: hsl(var(--p) / 0.1);
        font-weight: 600;
      }
    </style>
  </head>
  <body class="bg-base-200">
    <div class="p-4">
      <!-- 头部区域 -->
      <div class="flex items-center gap-3 mb-4">
        <a href="index.html" class="btn btn-ghost btn-sm btn-circle" title="返回首页">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
          </svg>
        </a>
        <div class="flex-1">
          <h1 class="text-lg font-bold">Example 网站</h1>
          <p class="text-xs text-base-content/60">example.com</p>
        </div>
      </div>

      <!-- 功能内容区域 - Tab 标签页 -->
      <div class="card bg-base-100 shadow-sm mb-3">
        <div class="card-body">
          <div class="tabs tabs-custom">
            <input type="radio" name="action_tabs" class="tab" aria-label="Cookie" checked />
            <input type="radio" name="action_tabs" class="tab" aria-label="登录信息" />
            <input type="radio" name="action_tabs" class="tab" aria-label="购物车" />
          </div>
          <div class="tab-panels">
            <div class="tab-panel" data-tab="Cookie">
              <h3 class="text-sm font-medium mb-1">获取特定 Cookie</h3>
              <p class="text-xs text-base-content/60 mb-3">获取 example.com 的登录凭证和会话信息</p>
              <button id="get-cookie-btn" class="btn btn-primary btn-sm w-full">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
                获取 Cookie
              </button>
            </div>
            <div class="tab-panel hidden" data-tab="登录信息">
              <h3 class="text-sm font-medium mb-1">获取用户登录信息</h3>
              <p class="text-xs text-base-content/60 mb-3">从 LocalStorage 读取用户登录状态和数据</p>
              <button id="get-login-btn" class="btn btn-secondary btn-sm w-full">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
                获取登录信息
              </button>
            </div>
            <div class="tab-panel hidden" data-tab="购物车">
              <h3 class="text-sm font-medium mb-1">获取购物车数据</h3>
              <p class="text-xs text-base-content/60 mb-3">读取 SessionStorage 中的购物车内容</p>
              <button id="get-cart-btn" class="btn btn-accent btn-sm w-full">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
                </svg>
                获取购物车数据
              </button>
            </div>
          </div>
        </div>
      </div>

        <!-- 数据展示区域（可折叠） -->
        <div id="data-display" class="collapse collapse-arrow bg-base-100 shadow-sm hidden">
          <input type="checkbox" />
          <div class="collapse-title text-sm font-medium">
            已获取数据预览
          </div>
          <div class="collapse-content">
            <pre id="data-content" class="bg-base-300 p-3 rounded text-xs overflow-x-auto"></pre>
          </div>
        </div>

        <!-- 发送到后端按钮 -->
        <button id="send-btn" class="btn btn-success w-full" disabled>
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
          </svg>
          发送到后端
        </button>
      </div>
    </div>

    <!-- 提示信息 -->
    <div id="toast" class="toast toast-center toast-middle hidden">
      <div id="toast-content" class="alert">
        <span id="toast-message"></span>
      </div>
    </div>

    <script>
      // 存储获取的数据
      let collectedData = null;

      // DOM 元素
      const getCookieBtn = document.getElementById('get-cookie-btn');
      const getLoginBtn = document.getElementById('get-login-btn');
      const getCartBtn = document.getElementById('get-cart-btn');
      const sendBtn = document.getElementById('send-btn');
      const dataDisplay = document.getElementById('data-display');
      const dataContent = document.getElementById('data-content');
      const toast = document.getElementById('toast');
      const toastContent = document.getElementById('toast-content');
      const toastMessage = document.getElementById('toast-message');

      // 显示提示
      function showToast(message, type = 'info') {
        toastMessage.textContent = message;
        toastContent.className = `alert alert-${type}`;
        toast.classList.remove('hidden');
        setTimeout(() => {
          toast.classList.add('hidden');
        }, 3000);
      }

      // 显示数据
      function showData(data) {
        collectedData = {
          site: 'example.com',
          timestamp: new Date().toISOString(),
          data: data
        };
        dataContent.textContent = JSON.stringify(collectedData, null, 2);
        dataDisplay.classList.remove('hidden');
        sendBtn.disabled = false;
      }

      // 获取 Cookie（模拟）
      function getCookie() {
        getCookieBtn.disabled = true;
        getCookieBtn.innerHTML = `<span class="loading loading-spinner loading-xs"></span> 获取中...`;

        setTimeout(() => {
          getCookieBtn.disabled = false;
          getCookieBtn.innerHTML = `
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
            </svg>
            获取 Cookie
          `;

          showData({
            type: 'cookie',
            sessionId: 'sess_' + Math.random().toString(36).substr(2, 9),
            authToken: 'tk_' + Math.random().toString(36).substr(2, 16),
            userId: 'user_' + Math.floor(Math.random() * 10000)
          });
          showToast('Cookie 获取成功', 'success');
        }, 1000);
      }

      // 获取登录信息（模拟）
      function getLoginInfo() {
        getLoginBtn.disabled = true;
        getLoginBtn.innerHTML = `<span class="loading loading-spinner loading-xs"></span> 获取中...`;

        setTimeout(() => {
          getLoginBtn.disabled = false;
          getLoginBtn.innerHTML = `
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
            获取登录信息
          `;

          showData({
            type: 'localStorage',
            isLoggedIn: true,
            username: 'demo_user',
            email: 'user@example.com',
            loginTime: new Date().toISOString()
          });
          showToast('登录信息获取成功', 'success');
        }, 1000);
      }

      // 获取购物车数据（模拟）
      function getCartData() {
        getCartBtn.disabled = true;
        getCartBtn.innerHTML = `<span class="loading loading-spinner loading-xs"></span> 获取中...`;

        setTimeout(() => {
          getCartBtn.disabled = false;
          getCartBtn.innerHTML = `
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
            </svg>
            获取购物车数据
          `;

          showData({
            type: 'sessionStorage',
            cartId: 'cart_' + Math.random().toString(36).substr(2, 8),
            items: [
              { id: 1, name: '商品 A', price: 99.99, quantity: 2 },
              { id: 2, name: '商品 B', price: 49.99, quantity: 1 }
            ],
            total: 249.97
          });
          showToast('购物车数据获取成功', 'success');
        }, 1000);
      }

      // 发送到后端
      async function sendToBackend() {
        if (!collectedData) {
          showToast('请先获取数据', 'warning');
          return;
        }

        // 获取设置
        const backendUrl = localStorage.getItem('backendUrl');
        const apiKey = localStorage.getItem('apiKey');

        if (!backendUrl || !apiKey) {
          showToast('请先配置后端地址和密钥', 'warning');
          setTimeout(() => {
            window.location.href = 'settings.html';
          }, 1500);
          return;
        }

        sendBtn.disabled = true;
        sendBtn.innerHTML = `<span class="loading loading-spinner loading-sm"></span> 发送中...`;

        // 模拟发送请求
        setTimeout(() => {
          sendBtn.disabled = false;
          sendBtn.innerHTML = `
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
            </svg>
            发送到后端
          `;

          // 模拟发送结果
          const isSuccess = Math.random() > 0.2; // 80% 成功率
          if (isSuccess) {
            showToast('数据发送成功', 'success');
            collectedData = null;
            dataDisplay.classList.add('hidden');
            sendBtn.disabled = true;
          } else {
            showToast('发送失败，请检查网络或配置', 'error');
          }
        }, 2000);
      }

      // 事件监听
      getCookieBtn.addEventListener('click', getCookie);
      getLoginBtn.addEventListener('click', getLoginInfo);
      getCartBtn.addEventListener('click', getCartData);
      sendBtn.addEventListener('click', sendToBackend);
    </script>
  </body>
</html>

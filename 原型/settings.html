<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <style>
      body {
        width: 470px;
        min-height: 400px;
      }
    </style>
  </head>
  <body class="bg-base-200">
    <div class="p-4">
      <!-- 头部区域 -->
      <div class="flex items-center gap-3 mb-4">
        <a href="index.html" class="btn btn-ghost btn-sm btn-circle" title="返回首页">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
          </svg>
        </a>
        <h1 class="text-lg font-bold">设置</h1>
      </div>

      <!-- 后端地址配置 -->
      <div class="card bg-base-100 shadow-sm mb-4">
        <div class="card-body">
          <div class="flex items-start gap-3 mb-4">
            <div class="w-10 h-10 rounded-lg bg-primary/10 flex items-center justify-center flex-shrink-0">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2m-2-4h.01M17 16h.01" />
              </svg>
            </div>
            <div class="flex-1">
              <h2 class="card-title text-base">后端地址配置</h2>
              <p class="text-sm text-base-content/70">配置数据发送的目标服务器地址</p>
            </div>
          </div>

          <div class="form-control">
            <label class="label">
              <span class="label-text">后端 URL</span>
            </label>
            <div class="flex items-center gap-2">
              <input
                type="url"
                id="backend-url"
                placeholder="https://api.example.com"
                class="input input-bordered flex-1"
              />
              <!-- URL 后缀展示 -->
              <code id="api-path-display" class="text-xs bg-base-200 px-2 py-2 rounded text-primary whitespace-nowrap">/api/extTest</code>
            </div>
            <label class="label">
              <span class="label-text-alt text-base-content/50">支持 http:// 或 https:// 协议</span>
            </label>
          </div>

          <!-- API 路径配置（可折叠） -->
          <div class="mt-2">
            <button
              type="button"
              id="toggle-api-path-btn"
              class="btn btn-ghost btn-xs"
            >
              <svg
                id="api-path-arrow"
                xmlns="http://www.w3.org/2000/svg"
                class="h-4 w-4 mr-1 transition-transform"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
              </svg>
              <span id="api-path-btn-text">配置 API 路径</span>
            </button>

            <div id="api-path-panel" class="hidden mt-2 flex items-center gap-2">
              <span class="text-base-content/50">/</span>
              <input
                type="text"
                id="api-path-input"
                placeholder="api/extTest"
                class="input input-bordered input-sm flex-1"
              />
              <button id="save-api-path-btn" class="btn btn-primary btn-sm">保存</button>
              <button id="reset-api-path-btn" class="btn btn-ghost btn-sm">重置</button>
            </div>
          </div>

          <!-- 测试连接按钮和状态 -->
          <div class="flex items-center gap-2 mt-4">
            <button id="test-connection-btn" class="btn btn-outline btn-sm">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
              </svg>
              测试连接
            </button>
            <span id="connection-status" class="hidden"></span>
          </div>
        </div>
      </div>

      <!-- 请求密钥配置 -->
      <div class="card bg-base-100 shadow-sm mb-4">
        <div class="card-body">
          <div class="flex items-start gap-3 mb-4">
            <div class="w-10 h-10 rounded-lg bg-secondary/10 flex items-center justify-center flex-shrink-0">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-secondary" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
              </svg>
            </div>
            <div class="flex-1">
              <h2 class="card-title text-base">请求密钥配置</h2>
              <p class="text-sm text-base-content/70">配置访问后端 API 的认证密钥</p>
            </div>
          </div>

          <div class="form-control">
            <label class="label">
              <span class="label-text">API Key</span>
            </label>
            <div class="relative">
              <input
                type="password"
                id="api-key"
                placeholder="请输入请求密钥"
                class="input input-bordered w-full pr-10"
              />
              <button
                type="button"
                id="toggle-key-visibility"
                class="absolute right-2 top-1/2 -translate-y-1/2 btn btn-ghost btn-xs btn-circle"
                title="显示/隐藏密钥"
              >
                <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                </svg>
                <svg id="eye-off-icon" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
                </svg>
              </button>
            </div>
            <label class="label">
              <span class="label-text-alt text-base-content/50">密钥将用于请求头 Authorization 字段</span>
            </label>
          </div>
        </div>
      </div>

      <!-- 保存按钮 -->
      <button id="save-btn" class="btn btn-primary w-full">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" />
        </svg>
        保存设置
      </button>

      <!-- 提示信息 -->
      <div id="toast" class="toast toast-center toast-middle hidden">
        <div id="toast-content" class="alert">
          <span id="toast-message"></span>
        </div>
      </div>
    </div>

    <script>
      // DOM 元素
      const backendUrlInput = document.getElementById('backend-url');
      const apiKeyInput = document.getElementById('api-key');
      const apiPathDisplay = document.getElementById('api-path-display');
      const apiPathInput = document.getElementById('api-path-input');
      const apiPathPanel = document.getElementById('api-path-panel');
      const toggleApiPathBtn = document.getElementById('toggle-api-path-btn');
      const apiPathArrow = document.getElementById('api-path-arrow');
      const apiPathBtnText = document.getElementById('api-path-btn-text');
      const resetApiPathBtn = document.getElementById('reset-api-path-btn');
      const saveApiPathBtn = document.getElementById('save-api-path-btn');
      const testConnectionBtn = document.getElementById('test-connection-btn');
      const connectionStatus = document.getElementById('connection-status');
      const toggleKeyVisibilityBtn = document.getElementById('toggle-key-visibility');
      const eyeIcon = document.getElementById('eye-icon');
      const eyeOffIcon = document.getElementById('eye-off-icon');
      const saveBtn = document.getElementById('save-btn');
      const toast = document.getElementById('toast');
      const toastContent = document.getElementById('toast-content');
      const toastMessage = document.getElementById('toast-message');

      // 常量
      const DEFAULT_API_PATH = '/api/extTest';
      let currentApiPath = DEFAULT_API_PATH;

      // 加载保存的设置
      function loadSettings() {
        const savedUrl = localStorage.getItem('backendUrl') || '';
        const savedKey = localStorage.getItem('apiKey') || '';
        const savedApiPath = localStorage.getItem('apiPath') || '';
        backendUrlInput.value = savedUrl;
        apiKeyInput.value = savedKey;
        currentApiPath = savedApiPath || DEFAULT_API_PATH;
        apiPathDisplay.textContent = currentApiPath;
        apiPathInput.value = currentApiPath.replace(/^\//, '');
      }

      // 显示提示
      function showToast(message, type = 'info') {
        toastMessage.textContent = message;
        toastContent.className = `alert alert-${type}`;
        toast.classList.remove('hidden');
        setTimeout(() => {
          toast.classList.add('hidden');
        }, 3000);
      }

      // 显示连接状态
      function showConnectionStatus(message, type) {
        connectionStatus.textContent = message;
        connectionStatus.className = `badge badge-${type}`;
        connectionStatus.classList.remove('hidden');
      }

      // 隐藏连接状态
      function hideConnectionStatus() {
        connectionStatus.classList.add('hidden');
      }

      // 测试连接
      async function testConnection() {
        const url = backendUrlInput.value.trim();

        if (!url) {
          showConnectionStatus('请输入后端地址', 'error');
          return;
        }

        // 简单的 URL 格式验证
        try {
          new URL(url);
        } catch {
          showConnectionStatus('URL 格式不正确', 'error');
          return;
        }

        testConnectionBtn.disabled = true;
        testConnectionBtn.innerHTML = `<span class="loading loading-spinner loading-xs"></span> 测试中...`;
        hideConnectionStatus();

        // 模拟测试连接（实际扩展中会发送真实请求）
        setTimeout(() => {
          testConnectionBtn.disabled = false;
          testConnectionBtn.innerHTML = `
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
            </svg>
            测试连接
          `;

          // 模拟测试结果（实际应根据真实请求结果）
          const testUrl = getTestUrl(url);
          console.log('测试连接 URL:', testUrl);
          const isSuccess = Math.random() > 0.3; // 70% 成功率模拟
          if (isSuccess) {
            showConnectionStatus('✓ 连接成功', 'success');
          } else {
            showConnectionStatus('✗ 连接失败', 'error');
          }
        }, 1500);
      }

      // 切换密钥显示/隐藏
      function toggleKeyVisibility() {
        const isPassword = apiKeyInput.type === 'password';
        apiKeyInput.type = isPassword ? 'text' : 'password';
        eyeIcon.classList.toggle('hidden', !isPassword);
        eyeOffIcon.classList.toggle('hidden', isPassword);
      }

      // 切换 API 路径面板显示/隐藏
      function toggleApiPathPanel() {
        const isHidden = apiPathPanel.classList.contains('hidden');
        if (isHidden) {
          apiPathPanel.classList.remove('hidden');
          apiPathArrow.classList.add('rotate-90');
          apiPathBtnText.textContent = '隐藏 API 路径配置';
        } else {
          apiPathPanel.classList.add('hidden');
          apiPathArrow.classList.remove('rotate-90');
          apiPathBtnText.textContent = '配置 API 路径';
        }
      }

      // 保存 API 路径
      function saveApiPath() {
        let path = apiPathInput.value.trim();
        if (path && !path.startsWith('/')) {
          path = '/' + path;
        }
        currentApiPath = path || DEFAULT_API_PATH;
        apiPathDisplay.textContent = currentApiPath;
        toggleApiPathPanel();
        showToast('API 路径已保存', 'success');
      }

      // 重置 API 路径为默认值
      function resetApiPath() {
        currentApiPath = DEFAULT_API_PATH;
        apiPathDisplay.textContent = currentApiPath;
        apiPathInput.value = DEFAULT_API_PATH.replace(/^\//, '');
        toggleApiPathPanel();
        showToast('已重置为默认路径', 'info');
      }

      // 获取完整的测试 URL
      function getTestUrl(baseUrl) {
        const path = currentApiPath || DEFAULT_API_PATH;
        return baseUrl.endsWith('/') ? `${baseUrl}${path.replace(/^\//, '')}` : `${baseUrl}${path}`;
      }

      // 保存设置
      function saveSettings() {
        const url = backendUrlInput.value.trim();
        const key = apiKeyInput.value.trim();

        if (!url) {
          showToast('请输入后端地址', 'warning');
          return;
        }

        if (!key) {
          showToast('请输入请求密钥', 'warning');
          return;
        }

        // 验证 URL 格式
        try {
          new URL(url);
        } catch {
          showToast('后端地址格式不正确', 'error');
          return;
        }

        // 保存到 localStorage（实际扩展中使用 chrome.storage）
        localStorage.setItem('backendUrl', url);
        localStorage.setItem('apiKey', key);
        localStorage.setItem('apiPath', currentApiPath);

        showToast('设置已保存', 'success');
      }

      // 事件监听
      testConnectionBtn.addEventListener('click', testConnection);
      toggleKeyVisibilityBtn.addEventListener('click', toggleKeyVisibility);
      toggleApiPathBtn.addEventListener('click', toggleApiPathPanel);
      saveApiPathBtn.addEventListener('click', saveApiPath);
      resetApiPathBtn.addEventListener('click', resetApiPath);
      saveBtn.addEventListener('click', saveSettings);

      // 页面加载时读取设置
      loadSettings();
    </script>
  </body>
</html>

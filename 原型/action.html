<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <style>
      body {
        width: 470px;
        min-height: 400px;
      }
    </style>
  </head>
  <body class="bg-base-200">
    <div class="p-4">
      <!-- 头部区域 -->
      <div class="flex items-center gap-3 mb-4">
        <a href="index.html" class="btn btn-ghost btn-sm btn-circle" title="返回首页">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
          </svg>
        </a>
        <div class="flex-1">
          <h1 id="site-name" class="text-lg font-bold">网站名称</h1>
          <p id="site-domain" class="text-xs text-base-content/60">domain.com</p>
        </div>
        <!-- 头部功能区组件 - 包含夜晚模式切换、设置和关于按钮 -->
        <div class="flex gap-2">
          <!-- 夜晚模式切换按钮 -->
          <button id="theme-toggle" class="btn btn-ghost btn-sm" title="切换夜晚模式">
            <!-- 太阳图标（白天模式显示） -->
            <svg id="sun-icon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
            </svg>
            <!-- 月亮图标（夜晚模式显示） -->
            <svg id="moon-icon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
            </svg>
          </button>

          <a href="settings.html" class="btn btn-ghost btn-sm" title="设置">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
          </a>
          <a href="about.html" class="btn btn-ghost btn-sm" title="关于">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
          </a>
        </div>
      </div>

      <!-- 功能内容区域 - 由各网站具体操作页面填充 -->
      <div id="action-content">
        <!-- 默认提示：这是一个模板框架 -->
        <div class="card bg-base-100 shadow-sm">
          <div class="card-body items-center text-center">
            <div class="w-16 h-16 bg-primary/10 rounded-2xl flex items-center justify-center mb-4">
              <span class="text-3xl">🧩</span>
            </div>
            <h3 class="card-title text-base">功能操作页模板</h3>
            <p class="text-sm text-base-content/70 mt-2">
              这是一个通用的操作页面框架。<br>
              各网站应创建自己的操作页面，继承此框架并填充自定义功能。
            </p>
            <div class="divider text-xs text-base-content/50">示例页面</div>
            <div class="space-y-2 w-full">
              <a href="action-example.html" class="btn btn-primary btn-sm w-full">
                <span class="mr-2">🌐</span> example.com 示例
              </a>
              <a href="action-another.html" class="btn btn-secondary btn-sm w-full">
                <span class="mr-2">🚀</span> another.com 示例
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      // 设置网站信息（由各子页面调用）
      function setSiteInfo(name, domain) {
        document.getElementById('site-name').textContent = name;
        document.getElementById('site-domain').textContent = domain;
      }

      // 获取设置信息（供子页面使用）
      function getSettings() {
        // 实际扩展中从 chrome.storage 读取
        // 这里使用 localStorage 模拟
        return {
          backendUrl: localStorage.getItem('backendUrl') || '',
          apiKey: localStorage.getItem('apiKey') || ''
        };
      }

      // 检查设置是否完整
      function checkSettings() {
        const settings = getSettings();
        if (!settings.backendUrl || !settings.apiKey) {
          return {
            valid: false,
            message: '请先配置后端地址和请求密钥'
          };
        }
        return { valid: true };
      }

      // 导出供子页面使用
      window.ActionFramework = {
        setSiteInfo,
        getSettings,
        checkSettings
      };

      // 主题切换功能
      (function() {
        const themeToggle = document.getElementById('theme-toggle');
        const sunIcon = document.getElementById('sun-icon');
        const moonIcon = document.getElementById('moon-icon');
        const html = document.documentElement;

        // 从 localStorage 读取主题设置
        const savedTheme = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

        // 初始化主题
        if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
          html.setAttribute('data-theme', 'dark');
          sunIcon.classList.add('hidden');
          moonIcon.classList.remove('hidden');
        } else {
          html.setAttribute('data-theme', 'light');
          sunIcon.classList.remove('hidden');
          moonIcon.classList.add('hidden');
        }

        // 切换主题
        themeToggle.addEventListener('click', function() {
          const currentTheme = html.getAttribute('data-theme');
          const newTheme = currentTheme === 'dark' ? 'light' : 'dark';

          html.setAttribute('data-theme', newTheme);
          localStorage.setItem('theme', newTheme);

          // 切换图标
          if (newTheme === 'dark') {
            sunIcon.classList.add('hidden');
            moonIcon.classList.remove('hidden');
          } else {
            sunIcon.classList.remove('hidden');
            moonIcon.classList.add('hidden');
          }
        });
      })();
    </script>
  </body>
</html>

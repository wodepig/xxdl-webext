<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <style>
      body {
        width: 470px;
        min-height: 400px;
      }
      /* tabs 样式 - 使用 DaisyUI 原生样式 */
      .tabs .tab {
        font-weight: 500;
      }
      .tabs .tab:checked {
        font-weight: 600;
      }
    </style>
  </head>
  <body class="bg-base-200">
    <div class="p-4">
      <!-- 头部区域 -->
      <div class="flex justify-between items-center mb-4">
        <h1 class="text-xl font-bold">🍪 数据获取扩展</h1>
        <div class="flex gap-2">
          <a href="settings.html" class="btn btn-ghost btn-sm" title="设置">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
          </a>
          <a href="about.html" class="btn btn-ghost btn-sm" title="关于">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
          </a>
        </div>
      </div>

      <!-- 欢迎信息区域 -->
      <div class="card bg-base-100 shadow-sm mb-4">
        <div class="card-body">
          <h2 class="card-title text-lg">欢迎使用 👋</h2>
          <p class="text-sm text-base-content/70">本扩展可以帮助您快速获取支持网站的 Cookie 和 Storage 数据。</p>
        </div>
      </div>

      <!-- Tab 标签页：使用方式和支持的网站 -->
      <div class="card bg-base-100 shadow-sm mb-4">
        <div class="card-body">
          <div class="tabs tabs-lifted">
            <input type="radio" name="home_tabs" class="tab" aria-label="使用方式" checked />
            <div class="tab-content">
              <ol class="list-decimal list-inside text-sm space-y-1 text-base-content/80">
                <li>打开支持的网站</li>
                <li>点击扩展图标</li>
                <li>选择需要的操作</li>
                <li>获取数据后可发送到后端</li>
              </ol>
            </div>

            <input type="radio" name="home_tabs" class="tab" aria-label="支持网站" />
            <div class="tab-content">
              <div class="flex flex-wrap gap-2">
                <span class="badge badge-primary">example.com</span>
                <span class="badge badge-primary">another.com</span>
                <span class="badge badge-ghost">更多网站开发中...</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- 当前页面状态提示 -->
      <div id="status-container" class="card shadow-sm">
        <!-- 状态内容将由 JavaScript 动态生成 -->
      </div>
    </div>

    <script>
      // 模拟配置数据 - 支持的网站列表
      const supportedSites = [
        { domain: 'example.com', name: 'Example 网站', actionPage: 'action-example.html' },
        { domain: 'another.com', name: 'Another 网站', actionPage: 'action-another.html' }
      ];

      // 获取当前页面状态（模拟）
      function checkCurrentPage() {
        // 实际扩展中，这里会通过 chrome.tabs API 获取当前页面 URL
        // 这里模拟几种情况用于原型展示
        const urlParams = new URLSearchParams(window.location.search);
        const mockUrl = urlParams.get('mock') || 'unknown';

        let currentSite = null;

        if (mockUrl.includes('example.com')) {
          currentSite = supportedSites[0];
        } else if (mockUrl.includes('another.com')) {
          currentSite = supportedSites[1];
        }

        renderStatus(currentSite);
      }

      // 渲染状态提示
      function renderStatus(currentSite) {
        const container = document.getElementById('status-container');

        if (currentSite) {
          // 当前页面支持
          container.className = 'card bg-success/10 border-success/30 shadow-sm';
          container.innerHTML = `
            <div class="card-body">
              <div class="flex items-center gap-2 mb-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-success" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <span class="font-medium text-success">当前页面支持操作</span>
              </div>
              <p class="text-sm text-base-content/70 mb-3">检测到您正在访问 <strong>${currentSite.name}</strong>，可以使用数据获取功能。</p>
              <a href="${currentSite.actionPage}" class="btn btn-success btn-sm w-full">
                进入操作页面
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6" />
                </svg>
              </a>
            </div>
          `;
        } else {
          // 当前页面不支持
          container.className = 'card bg-warning/10 border-warning/30 shadow-sm';
          container.innerHTML = `
            <div class="card-body">
              <div class="flex items-center gap-2 mb-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-warning" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
                <span class="font-medium text-warning">当前页面没有可操作的功能</span>
              </div>
              <p class="text-sm text-base-content/70">当前网站不在支持列表中，请访问支持的网站后重试。</p>
              <div class="mt-3 p-2 bg-base-200 rounded text-xs text-base-content/60">
                <p>💡 提示：可以在 URL 后添加 <code>?mock=example.com</code> 来模拟支持状态</p>
              </div>
            </div>
          `;
        }
      }

      // 页面加载时检查状态
      checkCurrentPage();
    </script>
  </body>
</html>
